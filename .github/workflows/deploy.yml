name: Docker Build -> Push -> Deploy

on:
  push:
    branches: [ "main" ]
  

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      
    - name: Setup Java
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin' # See 'Supported distributions' for available options
        java-version: '25'
    

    - name: Build Java
      run: |
        chmod +x gradlew
        ./gradlew build
      
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
        
    - name: Build Docker Image
      run: docker built -t ${{secrets.DOCKERHUB_USERNAME}}/spring-boot-ci-demo:latest .
      
    - name: Push Image to Docker Hub
      run: docker push ${{secrets.DOCKERHUB_USERNAME}}/spring-boot-ci-demo:latest

    - name: SSH and Deploy to EC2
      uses: appleboy/ssh-action@master
      with:
        host:  ${{secrets.EC2_HOST}}
        username: ${{secrets.EC2_USER}}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          docker stop spring-demo||true
          docker rm spring-demo||true
          docker pull ${{secrets.DOCKERHUB_USERNAME}}/spring-boot-ci-demo:latest
          docker run -d  --name spring-demo -p 8080:8080 ${{secrets.DOCKERHUB_USERNAME}}/spring-boot-ci-demo:latest

      
