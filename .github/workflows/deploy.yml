name: Docker Build -> Push -> Deploy

on:
  push:
    branches: [ "main" ]
  

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      run:  actions/checkout@v4
      
    - name: Setup Java
      uses: actions/checkout@v4
      with: 
        distribution: 'temurin'
        java-verison: '21'

    - name: Build Java
      run: ./mvnw clean package -DskipTests
      
    - name: Login to Docker Hub
      run: docker login -u "${{secrets.DOCKER_USERNAME}}" --password-stdin
        
    - name: Build Docker Image
      run: docker built -t ${{secrets.DOCKER_USERNAME}}/spring-boot-ci-demo:latest
      
    - name: Push Image to Docker Hub
      run: docker push ${{secrets.DOCKER_USERNAME}}/spring-boot-ci-demo:latest

    - name: SSH and Deploy to EC2
      uses: appleboy/ssh-action@master
      with:
        host:  ${{secrets.EC2_HOST}}
        username: ${{secrets.EC2_USER}}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          docker stop spring-demo||true
          docker rm spring-demo||true
          docker pull ${{secrets.DOCKER_USERNAME}}/spring-boot-ci-demo:latest
          docker run -d  --name spring-demo -p 8080:8080 ${{secrets.DOCKER_USERNAME}}/spring-boot-ci-demo:latest

      
